<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>틱톡 라이브 신청곡 시스템</title>
    <!-- Socket.io 라이브러리 로드 -->
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root {
            --tiktok-pink: #fe2c55;
            --tiktok-cyan: #25f4ee;
            --bg-dark: #121212;
            --card-bg: #1e1e1e;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Pretendard', 'Malgun Gothic', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        /* 설정 박스 (아이디 입력) */
        .setup-box {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 600px;
            margin-bottom: 20px;
            border: 1px solid #333;
        }

        .input-group {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        input {
            padding: 12px 15px;
            border-radius: 8px;
            border: 1px solid #444;
            background: #2a2a2a;
            color: white;
            flex: 1;
            font-size: 16px;
        }

        button {
            padding: 12px 25px;
            border-radius: 8px;
            border: none;
            background: var(--tiktok-pink);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #e0244d;
            transform: translateY(-2px);
        }

        #status {
            margin-top: 15px;
            font-size: 14px;
            color: #aaa;
        }

        /* 메인 컨텐츠 영역 (플레이어 + 대기열) */
        .main-content {
            display: flex;
            gap: 20px;
            width: 100%;
            max-width: 1000px;
            flex-wrap: wrap;
        }

        /* 플레이어 영역 */
        .player-section {
            flex: 2;
            min-width: 350px;
        }

        .current-song-info {
            background: var(--tiktok-pink);
            padding: 15px;
            border-radius: 10px 10px 0 0;
            font-weight: bold;
            font-size: 1.1em;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        #player-wrapper {
            background: #000;
            position: relative;
            padding-bottom: 56.25%;
            /* 16:9 비율 */
            height: 0;
            border-radius: 0 0 10px 10px;
            overflow: hidden;
        }

        #player-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* 대기열 영역 */
        .queue-section {
            flex: 1;
            min-width: 300px;
            background: var(--card-bg);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid #333;
            max-height: 550px;
            display: flex;
            flex-direction: column;
        }

        .queue-section h3 {
            margin-top: 0;
            border-bottom: 2px solid var(--tiktok-cyan);
            padding-bottom: 10px;
            color: var(--tiktok-cyan);
        }

        #queue-list {
            overflow-y: auto;
            flex-grow: 1;
        }

        .queue-item {
            padding: 12px;
            border-bottom: 1px solid #333;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .queue-item:last-child {
            border-bottom: none;
        }

        .song-title {
            font-weight: bold;
            color: #eee;
        }

        .song-user {
            font-size: 0.85em;
            color: #888;
        }

        /* 스크롤바 디자인 */
        #queue-list::-webkit-scrollbar {
            width: 6px;
        }

        #queue-list::-webkit-scrollbar-thumb {
            background: #444;
            border-radius: 10px;
        }
    </style>
</head>

<body>

    <div class="header">
        <h1>🎵 TikTok Live Music Bot</h1>
        <p>채팅으로 <strong>!신청곡 [노래제목]</strong>을 입력하세요!</p>
    </div>

    <div class="setup-box">
        <div class="input-group">
            <input type="text" id="tiktok-id" placeholder="틱톡 아이디 입력 (예: user123)">
            <button onclick="connectTikTok()">방송 연결하기</button>
        </div>
        <div id="status">상태: 연결 대기 중...</div>
    </div>

    <div class="main-content">
        <!-- 왼쪽: 현재 곡 및 플레이어 -->
        <div class="player-section">
            <div id="current-song" class="current-song-info">재생 중인 곡이 없습니다</div>
            <div id="player-wrapper">
                <div id="player"></div>
            </div>
        </div>

        <!-- 오른쪽: 대기열 목록 -->
        <div class="queue-section">
            <h3>신청곡 대기열</h3>
            <div id="queue-list">
                <div style="padding:20px; text-align:center; color:#666;">대기열이 비어 있습니다.</div>
            </div>
        </div>
    </div>

    <script>
        const socket = io();
        let player;
        let isPlayerReady = false;

        // 1. 유튜브 IFrame API 로드
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                events: {
                    'onReady': onPlayerReady,
                    'onStateChange': onPlayerStateChange
                }
            });
        }

        function onPlayerReady(event) {
            isPlayerReady = true;
        }

        function onPlayerStateChange(event) {
            // 영상이 종료되었을 때 (YT.PlayerState.ENDED = 0)
            if (event.data === 0) {
                socket.emit('songEnded');
            }
        }

        // 2. 틱톡 연결 함수
        function connectTikTok() {
            const username = document.getElementById('tiktok-id').value.trim();
            if (!username) {
                alert('아이디를 입력해주세요!');
                return;
            }

            // 연결 전 로컬 알림
            document.getElementById('status').innerText = '⏳ 방송에 접속 시도 중...';
            document.getElementById('status').style.color = '#aaa';

            // 서버에 연결 요청
            socket.emit('connect-tiktok', username);
        }

        // 3. 소켓 이벤트 리스너
        socket.on('connection-success', (data) => {
            document.getElementById('status').innerText = `✅ ${data.username}님 방송 연결 성공! (곧 접수를 시작합니다)`;
            document.getElementById('status').style.color = '#4CAF50';
        });

        socket.on('status-update', (msg) => {
            document.getElementById('status').innerText = msg;
            document.getElementById('status').style.color = '#25f4ee';
        });

        socket.on('connection-error', (msg) => {
            document.getElementById('status').innerText = `❌ 오류: ${msg}`;
            document.getElementById('status').style.color = '#fe2c55';
            alert(msg);
        });

        socket.on('playSong', (song) => {
            document.getElementById('current-song').innerText = `🎵 재생 중: ${song.title}`;
            if (isPlayerReady) {
                player.loadVideoById(song.videoId);
            }
        });

        socket.on('noMoreSongs', () => {
            document.getElementById('current-song').innerText = "재생 중인 곡이 없습니다";
            if (isPlayerReady && player.stopVideo) {
                player.stopVideo();
            }
        });

        socket.on('updateQueue', (queue) => {
            const list = document.getElementById('queue-list');
            if (queue.length === 0) {
                list.innerHTML = '<div style="padding:20px; text-align:center; color:#666;">대기열이 비어 있습니다.</div>';
                return;
            }

            list.innerHTML = queue.map((song, index) => `
                <div class="queue-item">
                    <span class="song-title">${index + 1}. ${song.title}</span>
                    <span class="song-user">신청자: ${song.requestedBy}</span>
                </div>
            `).join('');
        });
    </script>
</body>

</html>
